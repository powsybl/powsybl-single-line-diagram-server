spring:
  application:
    name: single-line-diagram-server
  datasource:
    hikari:
      # By default the limit is 10, following our scalability study this service can be very solicited
      # so we're increasing its limit
      maximum-pool-size: 20

  mvc:
    async:
      # To have the same behavior of no timeouts as regular endpoints for servlet 3.0+ asynccontext endpoints
      # Can be removed when set as default in our common ws config
      request-timeout: -1

gridsuite:
  services:
    -
      name: geo-data-server
      base-uri: http://geo-data-server/

powsybl-ws:
  database:
    name: diagram
  autoconfigure:
    base-exception-handler:
      enable: false


# 3 maximum concurrent Network Area Diagram generations for the current configuration
max-concurrent-nad-generations: 3

diagram-server:
  nad:
    max-voltage-levels: 1600

base-voltages-config:
  base-voltages-config-infos:
    - name: voltage-level-7
      min-value: 300
      max-value: 500
    - name: voltage-level-6
      min-value: 200
      max-value: 300
    - name: voltage-level-5
      min-value: 100
      max-value: 200
    - name: voltage-level-4
      min-value: 70
      max-value: 100
    - name: voltage-level-3
      min-value: 50
      max-value: 70
    - name: voltage-level-2
      min-value: 40
      max-value: 50
    - name: voltage-level-1
      min-value: 0
      max-value: 40
